<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>常用语管理</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #fff;
      color: #333;
      padding: 0 24px;
      max-width: 640px;
      margin: 0 auto;
    }
    .top-line {
      height: 3px;
      background: #b3d9ff;
      margin: 0 -24px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      color: #000;
      margin-top: 24px;
    }
    .divider {
      height: 1px;
      background: #eee;
      margin: 10px 0 4px;
    }
    .empty {
      text-align: center;
      color: #bbb;
      padding: 48px 0;
      font-size: 14px;
    }
    .list { margin: 0; }
    .item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .item::before {
      content: '\25CB';
      color: #ccc;
      font-size: 10px;
      margin-right: 14px;
      flex-shrink: 0;
    }
    .item-text {
      flex: 1;
      font-size: 14px;
      color: #333;
      line-height: 1.5;
      word-break: break-word;
      padding-right: 8px;
    }
    .item-act {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 15px;
      padding: 4px 5px;
      border-radius: 4px;
      transition: color .15s, background .15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .item-act:hover { color: #333; background: #f0f0f0; }
    .item-del { font-size: 14px; }
    .item-del:hover { color: #ff4d4f !important; background: #fff2f0 !important; }
    .add-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      padding-bottom: 32px;
    }
    .add-row input {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
    }
    .add-row input:focus { border-color: #4f7cff; }
    .add-row input::placeholder { color: #bbb; }
    .add-row button {
      background: #4f7cff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }
    .add-row button:hover { background: #3b66e0; }
    .add-row button:active { transform: scale(0.97); }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* ---- 修改弹窗 ---- */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 14px;
      width: 480px;
      max-width: calc(100vw - 48px);
      padding: 24px 28px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    .modal-close {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      border-radius: 4px;
      transition: color .15s, background .15s;
    }
    .modal-close:hover { color: #666; background: #f5f5f5; }
    .modal-body { position: relative; }
    .modal-textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px 14px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.6;
      color: #333;
      background: #fafbfc;
      outline: none;
      resize: none;
      transition: border-color .2s, background .2s;
    }
    .modal-textarea:focus { border-color: #4fc08d; background: #fff; }
    .modal-char-count {
      position: absolute;
      right: 10px;
      bottom: 10px;
      font-size: 11px;
      color: #bbb;
      pointer-events: none;
    }
    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .modal-btn {
      padding: 9px 24px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }
    .modal-btn:active { transform: scale(0.97); }
    .modal-btn-cancel {
      background: #fff;
      color: #4fc08d;
      border: 1px solid #4fc08d;
    }
    .modal-btn-cancel:hover { background: #f5fcf8; }
    .modal-btn-save {
      background: #4fc08d;
      color: #fff;
      border: none;
    }
    .modal-btn-save:hover { background: #3da87a; }
  </style>
</head>
<body>
  <div class="top-line"></div>
  <h1 class="title">常用语</h1>
  <div class="divider"></div>
  <div class="list" id="list"></div>
  <div class="empty" id="empty">暂无常用语，请在下方添加</div>
  <div class="add-row">
    <input type="text" id="input" placeholder="输入新的常用语..." maxlength="200" />
    <button id="addBtn">添加</button>
  </div>
  <div class="toast" id="toast"></div>

  <!-- 修改弹窗 -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">修改常用语</span>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <textarea class="modal-textarea" id="modalInput" maxlength="200"></textarea>
        <span class="modal-char-count" id="charCount">0/200</span>
      </div>
      <div class="modal-footer">
        <button class="modal-btn modal-btn-cancel" id="modalCancel">取消</button>
        <button class="modal-btn modal-btn-save" id="modalSave">保存</button>
      </div>
    </div>
  </div>

  <script src="phrases.js"></script>
</body>
</html>
