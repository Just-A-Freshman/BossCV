<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的简历</title>
  <style>
    /* ===== Design Tokens ===== */
    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --primary-light: #eff6ff;
      --bg-page: #f6f8fa;
      --bg-card: #fff;
      --bg-input: #fff;
      --bg-warning: #fff7ed;
      --text-primary: #1f2328;
      --text-secondary: #606266;
      --text-placeholder: #a8abb2;
      --text-label: #606266;
      --text-warning: #c2410c;
      --text-sidebar: #656d76;
      --border-card: #e5e7eb;
      --border-input: #dcdfe6;
      --border-input-hover: #c0c4cc;
      --border-input-focus: #409eff;
      --border-warning: #fdba74;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.03);
      --shadow-primary: 0 1px 3px rgba(59,130,246,0.3);
      --radius-card: 10px;
      --radius-input: 4px;
      --radius-btn: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      display: flex;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== 左侧侧边栏 ===== */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: var(--bg-card);
      border-right: 1px solid var(--border-card);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 10;
    }
    .sidebar-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      padding: 28px 24px 20px;
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px;
    }
    .sidebar-link {
      display: block;
      padding: 10px 14px;
      font-size: 14px;
      color: var(--text-sidebar);
      text-decoration: none;
      border-radius: var(--radius-sidebar-link, 8px);
      cursor: pointer;
      transition: background .15s, color .15s;
    }
    .sidebar-link:hover { background: var(--bg-page); color: var(--text-primary); }
    .sidebar-link.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
    .sidebar-actions {
      padding: 16px;
      border-top: 1px solid var(--border-card);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .sidebar-btn {
      width: 100%;
      padding: 10px 0;
      border-radius: var(--radius-btn);
      font-size: 14px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      text-align: center;
    }
    .sidebar-btn:active { transform: scale(0.97); }
    .sidebar-btn-save {
      background: var(--primary);
      color: #fff;
      border: none;
    }
    .sidebar-btn-save:hover { background: var(--primary-hover); }
    .sidebar-btn-sync {
      background: #fff;
      color: var(--primary);
      border: 1px solid var(--primary);
    }
    .sidebar-btn-sync:hover { background: var(--primary-light); }

    /* ===== 右侧主内容 ===== */
    .content {
      flex: 1;
      margin-left: 220px;
      padding: 32px 40px 80px;
    }

    /* ===== 信息提示条 ===== */
    .info-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      margin-bottom: 16px;
      background: var(--bg-warning);
      border: 1px solid var(--border-warning);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-warning);
      line-height: 1.5;
    }
    .info-banner svg { flex-shrink: 0; }

    /* ===== Card ===== */
    .card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      padding: 24px 28px;
      margin-bottom: 20px;
      border: 1px solid var(--border-card);
      box-shadow: var(--shadow-card);
    }

    /* ===== 分区标题 ===== */
    .section-header {
      display: flex;
      align-items: center;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-card);
      gap: 8px;
    }
    .section-header-bar {
      width: 3px;
      height: 16px;
      background: linear-gradient(#3b82f6, #60a5fa);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
      padding: 0;
      border: none;
      flex: 1;
    }
    .section-add-btn {
      padding: 8px 18px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-btn);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
      font-family: inherit;
      box-shadow: var(--shadow-primary);
    }
    .section-add-btn:hover { background: var(--primary-hover); }
    .section-add-btn:active { transform: scale(0.97); }

    /* ===== 字段网格 ===== */
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px 20px;
    }
    .field-row-3 {
      grid-template-columns: 1fr 1fr 1fr;
    }
    .field-row-4 {
      grid-template-columns: 1fr 1fr 1fr 1fr;
    }
    .field-group { display: flex; flex-direction: column; gap: 4px; }
    .field-group.full { grid-column: 1 / -1; }

    /* ===== 表单域 ===== */
    .field-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-label);
      margin-bottom: 4px;
      display: block;
    }
    .field-input {
      width: 100%;
      height: 34px;
      padding: 0 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-input);
      font-size: 13px;
      font-family: inherit;
      color: var(--text-secondary);
      background: var(--bg-input);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .field-input::placeholder { color: var(--text-placeholder); }
    .field-input:hover { border-color: var(--border-input-hover); }
    .field-input:focus {
      border-color: var(--border-input-focus);
      box-shadow: 0 0 0 1px var(--border-input-focus);
    }
    .field-textarea {
      width: 100%;
      min-height: 124px;
      padding: 10px 12px;
      border: 1px solid var(--border-input);
      border-radius: var(--radius-input);
      font-size: 13px;
      font-family: inherit;
      line-height: 1.6;
      color: var(--text-secondary);
      background: var(--bg-input);
      outline: none;
      resize: none;
      field-sizing: content;
      transition: border-color .15s, box-shadow .15s;
    }
    .field-textarea::placeholder { color: var(--text-placeholder); }
    .field-textarea:hover { border-color: var(--border-input-hover); }
    .field-textarea:focus {
      border-color: var(--border-input-focus);
      box-shadow: 0 0 0 1px var(--border-input-focus);
    }
    .field-textarea.tall { min-height: 140px; }

    /* ===== 动态列表（技能块） ===== */
    .dyn-list { display: flex; flex-direction: column; gap: 10px; }
    /* ===== 删除按钮 ===== */
    .dyn-del {
      background: none;
      border: none;
      color: #a8abb2;
      cursor: pointer;
      font-size: 18px;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color .15s, background .15s;
      line-height: 1;
      flex-shrink: 0;
    }
    .dyn-del:hover { color: #ff4d4f; background: #fff2f0; }

    /* ===== 复合条目卡片（工作/实习/项目） ===== */
    .entry-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      box-shadow: var(--shadow-card);
      transition: border-color .2s;
    }
    .entry-card:hover { border-color: var(--primary); }
    .entry-card .dyn-del {
      position: absolute;
      top: 12px;
      right: 16px;
      font-size: 16px;
    }
    .entry-card .field-row { margin-bottom: 10px; }
    .entry-card .field-row:last-child { margin-bottom: 0; }

    /* ===== 自定义模块条目 ===== */
    .extra-entry {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
      box-shadow: var(--shadow-card);
      transition: border-color .2s;
    }
    .extra-entry:hover { border-color: var(--primary); }
    .extra-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .extra-header .field-label { flex-shrink: 0; margin-bottom: 0; }
    .extra-title {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border-input);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
      color: var(--text-secondary);
      background: var(--bg-card);
    }
    .extra-title:focus { border-color: var(--primary); }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-primary);
      color: #fff;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; }

    .section-anchor { scroll-margin-top: 20px; }

    /* ===== 多版本管理器 ===== */
    .version-manager {
      margin-top: 12px;
      border: 1px solid var(--border-card);
      border-radius: 8px;
      overflow: hidden;
    }
    .version-tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 10px;
      background: var(--bg-page);
      border-bottom: 1px solid var(--border-card);
      flex-wrap: wrap;
    }
    .version-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 12px;
      cursor: pointer;
      background: #fff;
      color: var(--text-secondary);
      border: 1px solid var(--border-input);
      transition: all .15s;
      user-select: none;
    }
    .version-pill:hover { border-color: var(--primary); color: var(--primary); }
    .version-pill.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .vp-label {
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .vp-label[contenteditable] { outline: none; min-width: 24px; }
    .vp-label[contenteditable]:focus { border-bottom: 1px dotted currentColor; }
    .vp-del {
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      color: inherit;
      opacity: 0.6;
      padding: 0 2px;
    }
    .vp-del:hover { opacity: 1 !important; }
    .version-add {
      background: none;
      border: 1px dashed var(--border-input);
      color: var(--text-placeholder);
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .version-add:hover { border-color: var(--primary); color: var(--primary); }
    .version-items { padding: 12px; }
    .version-item.hidden { display: none !important; }

    @media (max-width: 640px) {
      .sidebar { display: none; }
      .content { margin-left: 0; padding: 20px 16px 60px; }
      .field-row { grid-template-columns: 1fr; }
      .field-row-3 { grid-template-columns: 1fr; }
      .info-banner { font-size: 12px; padding: 8px 12px; }
    }
  </style>
</head>
<body>

  <!-- ===== 侧边栏 ===== -->
  <aside class="sidebar">
    <h1 class="sidebar-title">我的简历</h1>
    <nav class="sidebar-nav" id="toc"></nav>
    <div class="sidebar-actions">
      <button class="sidebar-btn sidebar-btn-sync" id="syncBtn">同步在线简历</button>
      <button class="sidebar-btn sidebar-btn-save" id="saveBtn">导出简历内容</button>
    </div>
  </aside>

  <main class="content" id="content">
    <div class="info-banner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EA580C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M12 16v-4"></path>
        <path d="M12 8h.01"></path>
      </svg>
      <span>此简历是给AI阅读的，<strong>尽管往里面塞各种经历和内容！</strong></span>
    </div>

    <!-- 基础信息 -->
    <section class="card section-anchor" id="s-basic">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">基础信息</h2>
      </div>
      <div class="field-row">
        <div class="field-group"><label class="field-label">姓名</label><input class="field-input" data-path="basic.name" /></div>
        <div class="field-group"><label class="field-label">性别</label><input class="field-input" data-path="basic.gender" /></div>
        <div class="field-group"><label class="field-label">出生日期</label><input class="field-input" data-path="basic.birthDate" placeholder="1995-01" /></div>
        <div class="field-group"><label class="field-label">工作年限</label><input class="field-input" data-path="basic.workYears" placeholder="8年" /></div>
        <div class="field-group"><label class="field-label">求职意向</label><input class="field-input" data-path="basic.jobIntention" /></div>
        <div class="field-group"><label class="field-label">电话</label><input class="field-input" data-path="basic.phone" /></div>
        <div class="field-group"><label class="field-label">邮箱</label><input class="field-input" data-path="basic.email" /></div>
        <div class="field-group"><label class="field-label">政治面貌</label><input class="field-input" data-path="basic.politicalStatus" /></div>
      </div>
      <div class="field-group full" style="margin-top:14px">
        <label class="field-label">自定义信息</label>
        <textarea class="field-textarea" data-path="basic.custom" placeholder="其他需要补充的基础信息"></textarea>
      </div>
    </section>

    <!-- 教育背景 -->
    <section class="card section-anchor" id="s-education">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">教育背景</h2>
        <button class="section-add-btn" id="educationAdd">+ 添加教育经历</button>
      </div>
      <div id="educationList"></div>
    </section>

    <!-- 专业技能 -->
    <section class="card section-anchor" id="s-skills">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">专业技能</h2>
        <button class="section-add-btn" id="skillsAdd">+ 添加技能块</button>
      </div>
      <div class="dyn-list" id="skillsList"></div>
    </section>

    <!-- 工作经历 -->
    <section class="card section-anchor" id="s-work">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">工作经历</h2>
        <button class="section-add-btn" id="workAdd">+ 添加工作经历</button>
      </div>
      <div id="workList"></div>
    </section>

    <!-- 实习经历 -->
    <section class="card section-anchor" id="s-internship">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">实习经历</h2>
        <button class="section-add-btn" id="internshipAdd">+ 添加实习经历</button>
      </div>
      <div id="internshipList"></div>
    </section>

    <!-- 项目经历 -->
    <section class="card section-anchor" id="s-projects">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">项目经历</h2>
        <button class="section-add-btn" id="projectsAdd">+ 添加项目经历</button>
      </div>
      <div id="projectsList"></div>
    </section>

    <!-- 荣誉证书 -->
    <section class="card section-anchor" id="s-honors">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">荣誉证书</h2>
      </div>
      <textarea class="field-textarea tall" data-path="honors" placeholder="列举获得的荣誉和证书"></textarea>
    </section>

    <!-- 自我评价 -->
    <section class="card section-anchor" id="s-self">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">自我评价</h2>
      </div>
      <textarea class="field-textarea tall" data-path="selfEvaluation" placeholder="简要描述个人优势及职业规划"></textarea>
    </section>

    <!-- 添加模块 -->
    <section class="card section-anchor" id="s-extra">
      <div class="section-header">
        <span class="section-header-bar"></span>
        <h2 class="card-title">添加模块</h2>
        <button class="section-add-btn" id="extraAdd">+ 添加模块</button>
      </div>
      <div id="extraList"></div>
    </section>

  </main>

  <div class="toast" id="toast"></div>
  <script src="resume.js"></script>
</body>
</html>
